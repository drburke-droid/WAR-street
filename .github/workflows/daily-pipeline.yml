name: Daily Data Pipeline

on:
  schedule:
    # 10:00 UTC = 6:00 AM ET during EDT (March-November)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Pull WAR from FanGraphs
        run: |
          curl -v -X POST \
            https://war-street-production.up.railway.app/admin/pipeline/war-pull \
            -H "x-admin-key: ${{ secrets.JWT_SECRET }}" \
            --max-time 300

      - name: Pull box scores from MLB API
        run: |
          curl -v -X POST \
            https://war-street-production.up.railway.app/admin/pipeline/boxscores \
            -H "x-admin-key: ${{ secrets.JWT_SECRET }}" \
            --max-time 180

      - name: Recalculate prices
        run: |
          curl -v -X POST \
            https://war-street-production.up.railway.app/admin/pipeline/recalc \
            -H "x-admin-key: ${{ secrets.JWT_SECRET }}" \
            --max-time 180
